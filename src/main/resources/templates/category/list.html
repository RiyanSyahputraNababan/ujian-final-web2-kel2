<h2>Category List</h2>

<a href="/categories/create">Tambah Category</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nama</th>
        <th>Aksi</th>
    </tr>

    <tr th:each="c : ${categories}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.name}"></td>
        <td>
            <a th:href="@{'/categories/edit/' + ${c.id}}">Edit</a>
            <a th:href="@{'/categories/delete/' + ${c.id}}">Delete</a>
        </td>
    </tr>
</table>
